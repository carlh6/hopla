<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hopla! — carnet à bières</title>
<meta name="theme-color" content="#14100B" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hopla" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Outfit:wght@300..700&family=JetBrains+Mono:wght@400;600&family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Poppins:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap');
  html, body { margin: 0; background: #14100B; }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  #root { min-height: 100vh; }
  .boot { color: #A08D6C; font-family: system-ui, sans-serif; text-align: center; padding-top: 40vh; }
  input:focus, textarea:focus, select:focus { outline: 2px solid #E8A02066; }
  button { transition: transform .12s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease, opacity .18s ease; }
  button:not(:disabled):active { transform: scale(.96); }
  .rowbtn:hover { border-color: #E8A020 !important; box-shadow: 0 4px 16px rgba(232,160,32,0.12); }
  .zoomimg { transition: transform .35s ease; }
  .zoomimg:hover { transform: scale(1.06); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .fadeup { animation: fadeUp .4s ease both; }
  @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-in { animation: slideUp .3s cubic-bezier(.2,.8,.3,1) both; }
  @keyframes bubrise { from { transform: translateY(180px); opacity: .9; } to { transform: translateY(-30px); opacity: 0; } }
  .cssbub { position: absolute; bottom: -10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.6); animation: bubrise linear infinite; }
  @media (prefers-reduced-motion: reduce) { *, .fadeup, .modal-in, .cssbub { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div id="root"><div class="boot">Un instant, la mousse se dépose…</div></div>
<script>
try {
  var s = JSON.parse(localStorage.getItem("hopla:settings:v1")||"{}");
  var bg = ({pub:"#241608", summer:"#FFF3DE", classic:"#14100C"})[s.theme||"pub"];
  document.documentElement.style.background = bg;
  document.body.style.background = bg;
  var boot = document.querySelector(".boot");
  if (s.theme==="summer" && boot) boot.style.color = "#B98A56";
} catch(e){}
</script>
